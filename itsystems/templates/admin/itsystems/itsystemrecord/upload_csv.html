{% extends "admin/base_site.html" %}
{% block content %}
<h1><b>Import Changes from CSV</b></h1>
<form action="{% url 'admin:itsystems_itsystemrecord_import' %}" method="POST" enctype="multipart/form-data" class="form-horizontal">
    {% csrf_token %}
    <div class="form-group">
        <div>
            <input type="file" name="csv_file" id="csv_file" required="True" class="form-control">
        </div>                   
    </div>
    <br>
    <div class="form-group">                   
        <div>
            <button> <span></span>Import</button>
        </div>
    </div>
</form>
{% endblock %}
